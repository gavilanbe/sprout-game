<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SPROUT · una microaventura</title>
<meta name="theme-color" content="#0b1a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#0b1a10; --pine2:#102416; --moss:#2a4a34; --leaf:#70d838;
    --cream:#f8e8c8; --amber:#e8b050;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(ellipse at 50% -20%, #16301e 0%, transparent 60%),
      repeating-conic-gradient(var(--pine2) 0% 25%, var(--pine) 0% 50%) 0 0/8px 8px,
      var(--pine);
    color:var(--cream);
    font-family:"Press Start 2P", monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:16px; overflow:hidden; user-select:none; -webkit-user-select:none;
    touch-action:none; overscroll-behavior:none;
  }
  html{touch-action:none; overscroll-behavior:none}
  header{text-align:center}
  h1{
    font-size:clamp(18px,4vw,30px); letter-spacing:4px;
    color:var(--leaf);
    text-shadow:0 3px 0 #1d4f22, 0 6px 0 #0d2a12, 0 0 24px rgba(112,216,56,.35);
  }
  h1 .seed{color:var(--amber); text-shadow:0 3px 0 #6e4a14, 0 6px 0 #3a2708, 0 0 24px rgba(232,176,80,.35)}
  .tag{font-size:8px; color:#7fae8c; margin-top:10px; letter-spacing:1px}
  .shell{
    position:relative; line-height:0;
    padding:14px; background:linear-gradient(#16301e,#0e2014);
    border:3px solid var(--moss); border-radius:10px;
    box-shadow:0 0 0 3px #07120b, 0 14px 40px rgba(0,0,0,.6), 0 0 60px rgba(112,216,56,.12);
  }
  .shell::before{ /* power LED */
    content:""; position:absolute; top:5px; left:8px; width:5px; height:5px; border-radius:50%;
    background:var(--leaf); box-shadow:0 0 8px var(--leaf);
  }
  canvas{
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#081408; display:block; touch-action:none;
  }
  .scan{ /* sutiles scanlines sobre la pantalla */
    position:absolute; inset:14px; pointer-events:none; border-radius:2px;
    background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.10) 2px 3px);
    mix-blend-mode:multiply;
  }
  .keys{display:flex; gap:14px; flex-wrap:wrap; justify-content:center; font-size:8px; color:#9ec7aa}
  .keys span{display:flex; align-items:center; gap:6px}
  kbd{
    font:inherit; background:#142a1b; border:2px solid var(--moss); border-bottom-width:4px;
    border-radius:5px; padding:5px 7px; color:var(--cream);
  }
  footer{font-size:7px; color:#4c7259; letter-spacing:1px}
  /* mandos táctiles */
  #touch{display:none; position:fixed; inset:auto 0 0 0; height:190px; pointer-events:none;
    padding-bottom:env(safe-area-inset-bottom,0)}
  body.touch #touch{display:block}
  /* en móvil: fuera la decoración de escritorio, el juego agarra toda la pantalla */
  body.touch{padding:0; gap:0}
  body.touch header, body.touch .keys, body.touch footer{display:none}
  body.touch .shell{padding:0; border:0; border-radius:0; box-shadow:none; background:transparent}
  body.touch .shell::before{display:none}
  body.touch .scan{inset:0}
  .tbtn{
    position:absolute; pointer-events:auto; background:rgba(42,74,52,.55);
    border:2px solid rgba(112,216,56,.4); border-radius:10px; width:54px; height:54px;
    color:var(--cream); font-size:14px; display:flex; align-items:center; justify-content:center;
    touch-action:none; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
    -webkit-user-select:none; user-select:none;
  }
  #tU{left:70px; bottom:122px} #tD{left:70px; bottom:12px} #tL{left:12px; bottom:67px} #tR{left:128px; bottom:67px}
  #tA{right:22px; bottom:54px; width:70px; height:70px; border-radius:50%; background:rgba(232,176,80,.5); border-color:rgba(232,176,80,.6)}
  #tB{right:104px; bottom:26px; width:56px; height:56px; border-radius:50%; background:rgba(200,106,56,.5); border-color:rgba(200,106,56,.6)}
  #tM{right:26px; bottom:140px; width:44px; height:34px; font-size:15px}
</style>
</head>
<body>
<header>
  <h1>SPR<span class="seed">O</span>UT</h1>
  <div class="tag">y las 8 semillas · una microaventura hecha a mano</div>
</header>

<div class="shell">
  <canvas id="cv" width="160" height="144"></canvas>
  <div class="scan"></div>
</div>

<div class="keys">
  <span><kbd>←↑↓→</kbd> mover</span>
  <span><kbd>Z</kbd> hoja / hablar</span>
  <span><kbd>X</kbd> bomba</span>
  <span><kbd>↵</kbd> zurrón</span>
  <span><kbd>M</kbd> música</span>
</div>
<footer>HECHO A MANO CON RECTÁNGULOS · 2026</footer>

<div id="touch">
  <div class="tbtn" id="tU">▲</div><div class="tbtn" id="tD">▼</div>
  <div class="tbtn" id="tL">◀</div><div class="tbtn" id="tR">▶</div>
  <div class="tbtn" id="tA">Z</div>
  <div class="tbtn" id="tB">X</div>
  <div class="tbtn" id="tM">≡</div>
</div>

<!-- el juego, por módulos de dominio: el ORDEN importa (ámbito global compartido).
     mapa completo y recetas para crecer: ARCHITECTURE.md -->
<script src="js/01-core.js"></script>
<script src="js/02-sprites.js"></script>
<script src="js/03-tiles.js"></script>
<script src="js/04-maps.js"></script>
<script src="js/05-texts.js"></script>
<script src="js/06-audio.js"></script>
<script src="js/07-state.js"></script>
<script src="js/08-world.js"></script>
<script src="js/09-player.js"></script>
<script src="js/10-progress.js"></script>
<script src="js/11-enemies.js"></script>
<script src="js/12-update.js"></script>
<script src="js/13-render.js"></script>
<script src="js/14-input.js"></script>
<script src="js/15-boot.js"></script>
</body>
</html>
